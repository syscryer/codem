name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.artifact }} ${{ matrix.flavor }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact: windows-x64
            flavor: with-node
            npmScript: package:win:with-node
            bundleRoot: src-tauri/target/release/bundle
          - platform: windows-latest
            artifact: windows-x64
            flavor: no-node
            npmScript: package:win:no-node
            bundleRoot: src-tauri/target/release/bundle
          - platform: macos-latest
            artifact: macos-arm64
            flavor: with-node
            npmScript: package:mac-arm64:with-node
            bundleRoot: src-tauri/target/aarch64-apple-darwin/release/bundle
          - platform: macos-latest
            artifact: macos-arm64
            flavor: no-node
            npmScript: package:mac-arm64:no-node
            bundleRoot: src-tauri/target/aarch64-apple-darwin/release/bundle
          - platform: ubuntu-22.04
            artifact: linux-x64
            flavor: with-node
            npmScript: package:linux:with-node
            bundleRoot: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle
          - platform: ubuntu-22.04
            artifact: linux-x64
            flavor: no-node
            npmScript: package:linux:no-node
            bundleRoot: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"

          if [ "$tag" != "$package_version" ]; then
            echo "::error::Tag v$tag does not match package.json version $package_version"
            exit 1
          fi

          if [ "$tag" != "$tauri_version" ]; then
            echo "::error::Tag v$tag does not match src-tauri/tauri.conf.json version $tauri_version"
            exit 1
          fi

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            rpm \
            wget

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust target
        if: runner.os == 'macOS'
        run: |
          if [ "${{ matrix.artifact }}" = "macos-arm64" ]; then
            rustup target add aarch64-apple-darwin
          else
            rustup target add x86_64-apple-darwin
          fi

      - name: Add Linux Rust target
        if: runner.os == 'Linux'
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.artifact }}-${{ matrix.flavor }}

      - name: Install dependencies
        run: npm ci

      - name: Run packaging doctor
        run: npm run package:doctor

      - name: Validate updater signing secrets
        if: matrix.flavor == 'with-node'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY secret. Tauri updater artifacts must be signed."
            exit 1
          fi

      - name: Build platform bundle
        env:
          CODEM_CREATE_UPDATER_ARTIFACTS: ${{ matrix.flavor == 'with-node' && '1' || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run ${{ matrix.npmScript }}

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          bundle_root="${{ matrix.bundleRoot }}"

          if [ ! -d "$bundle_root" ]; then
            echo "::error::Bundle output not found: $bundle_root"
            exit 1
          fi

          node scripts/release-assets.mjs \
            --bundle-root "$bundle_root" \
            --out-dir release-assets \
            --artifact "${{ matrix.artifact }}" \
            --flavor "${{ matrix.flavor }}"

          if [ "${RUNNER_OS}" = "Windows" ] && [ "${{ matrix.artifact }}" = "windows-x64" ] && [ "${{ matrix.flavor }}" = "with-node" ]; then
            portable_root="release-assets/CodeM"
            mkdir -p "$portable_root"
            cp src-tauri/target/release/codem.exe "$portable_root/CodeM.exe"
            cp -R src-tauri/target/release/_up_ "$portable_root/_up_"
            powershell -NoProfile -Command "Compress-Archive -Path 'release-assets/CodeM' -DestinationPath 'release-assets/CodeM-portable-${{ matrix.artifact }}-${{ matrix.flavor }}.zip' -Force"

            rm -rf "$portable_root"
          fi

          if [ "${RUNNER_OS}" = "macOS" ]; then
            while IFS= read -r -d '' app; do
              app_base="$(basename "$app" .app)"
              ditto -c -k --sequesterRsrc --keepParent "$app" \
                "release-assets/${app_base}-${{ matrix.artifact }}-${{ matrix.flavor }}.app.zip"
            done < <(find "$bundle_root" -type d -name "*.app" -print0)
          fi

          if [ "$(find release-assets -type f | wc -l | tr -d ' ')" = "0" ]; then
            echo "::error::No release assets were collected"
            exit 1
          fi

          find release-assets -type f -print | sort

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codem-${{ matrix.artifact }}-${{ matrix.flavor }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          prefix="codem-${version}/"

          mkdir -p release-assets
          find downloaded-assets -maxdepth 2 -type f -exec cp {} release-assets/ \;
          git archive --format=zip --prefix="$prefix" -o "release-assets/codem-${version}-source.zip" HEAD
          git archive --format=tar --prefix="$prefix" HEAD | gzip -9 > "release-assets/codem-${version}-source.tar.gz"
          node scripts/generate-latest-json.mjs release-assets "${GITHUB_REPOSITORY}" "${GITHUB_REF_NAME}" "$version"

          (
            cd release-assets
            find . -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
